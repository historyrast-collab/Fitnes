<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITFORGE | ELITE PRESTIGE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff88; --royal: #8a2be2; --bg: #080808; --card: #141414;
            --text: #ffffff; --sub: #666666; --danger: #ff3e3e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* --- PRESTIGE UI ELEMENTS --- */
        .glass-panel { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); border-radius: 25px; }
        .neon-shadow { box-shadow: 0 0 20px rgba(0, 255, 136, 0.15); }
        
        /* --- HEADER & DASHBOARD --- */
        .app-header { padding: 50px 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .app-header h1 { font-family: 'Orbitron', sans-serif; font-size: 20px; letter-spacing: 2px; margin: 0; background: linear-gradient(to right, #00ff88, #8a2be2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .top-summary { margin: 15px 20px; padding: 30px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
        .top-summary b { display: block; font-size: 20px; font-weight: 900; }
        .top-summary span { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; }

        /* --- MODERN CARDS --- */
        .workout-grid { padding: 0 20px 120px; }
        .card-elite { 
            position: relative; height: 160px; border-radius: 30px; margin-bottom: 20px; overflow: hidden;
            background: linear-gradient(45deg, #111, #1a1a1a); display: flex; flex-direction: column; justify-content: flex-end; padding: 25px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer;
        }
        .card-elite:active { transform: scale(0.95); }
        .card-elite::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 60%); }
        .card-content { position: relative; z-index: 2; }
        .card-content h3 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: 0.5px; }
        .card-content p { margin: 5px 0 0; font-size: 11px; color: var(--neon); font-weight: 700; text-transform: uppercase; }

        /* --- ENGINE MODAL (APP STYLE) --- */
        #engine {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg);
            z-index: 9999; display: none; flex-direction: column; animation: slideUp 0.5s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .engine-top { padding: 25px; display: flex; align-items: center; justify-content: space-between; }
        .progress-container { flex: 1; height: 6px; background: #1a1a1a; margin: 0 20px; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--neon); width: 0%; transition: 0.6s; }

        .visual-frame { width: 85%; height: 280px; margin: 20px auto; border-radius: 40px; background: #111; position: relative; overflow: hidden; border: 1px solid #222; }
        .anim-placeholder { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a, #000); }
        .anim-placeholder i { font-size: 80px; color: var(--neon); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.5; } }

        .ex-title { font-size: 32px; font-weight: 900; margin: 10px 0; font-family: 'Orbitron', sans-serif; }
        .ex-reps { font-size: 50px; font-weight: 900; color: var(--neon); margin-bottom: 30px; }

        /* --- ACTION BUTTONS --- */
        .btn-action {
            background: var(--neon); color: #000; border: none; padding: 22px; border-radius: 25px;
            width: 85%; font-weight: 900; font-size: 16px; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3); transition: 0.3s;
        }
        .btn-action:active { transform: scale(0.9); }

        /* --- BOTTOM NAV --- */
        .bottom-bar {
            position: fixed; bottom: 30px; left: 10%; width: 80%; height: 75px; 
            background: rgba(20,20,20,0.9); backdrop-filter: blur(20px); border-radius: 40px;
            display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.05); z-index: 9000;
        }
        .nav-btn { font-size: 22px; color: #444; transition: 0.3s; }
        .nav-btn.active { color: var(--neon); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="view-home">
    <div class="app-header">
        <h1>FITFORGE ELITE</h1>
        <i class="fas fa-user-circle" style="font-size: 28px; color: #222;"></i>
    </div>

    <div class="top-summary glass-panel neon-shadow">
        <div><b id="s-ex">0</b><span>BAŞARI</span></div>
        <div><b id="s-kcal">0</b><span>KCAL</span></div>
        <div><b id="s-min">0</b><span>DAKİKA</span></div>
    </div>

    <div style="padding: 20px 25px;">
        <h2 style="font-size: 14px; color: var(--sub); letter-spacing: 2px;">GÜNLÜK MÜFREDAT</h2>
    </div>

    <div class="workout-grid" id="list-render"></div>
</div>

<div id="engine">
    <div class="engine-top">
        <i class="fas fa-chevron-left" onclick="stopWorkout()" style="font-size: 24px;"></i>
        <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
        <div style="font-weight: 900; color: var(--neon);" id="step-txt">1/8</div>
    </div>

    <div class="visual-frame neon-shadow">
        <div class="anim-placeholder"><i id="ex-icon" class="fas fa-person-running"></i></div>
    </div>

    <div style="text-align: center; padding: 20px;">
        <div class="ex-title" id="ex-name">HAZIRLAN</div>
        <div class="ex-reps" id="ex-val">X 15</div>
        <button class="btn-action" onclick="nextStep()">SIRADAKİ HAREKET</button>
    </div>
</div>

<div class="bottom-bar">
    <div class="nav-btn active"><i class="fas fa-bolt"></i></div>
    <div class="nav-btn"><i class="fas fa-chart-simple"></i></div>
    <div class="nav-btn"><i class="fas fa-shield-halved"></i></div>
    <div class="nav-btn" onclick="resetAll()"><i class="fas fa-power-off"></i></div>
</div>

<script>
    // --- PROFESSIONAL DATA SET ---
    const workouts = [
        { id: 1, name: "TÜM VÜCUT PARÇALAMA", kcal: 320, time: 12, 
          exercises: [
              {n: "Jumping Jacks", v: "X 30", i: "fa-person-running"},
              {n: "Geniş Şınav", v: "X 15", i: "fa-hand-fist"},
              {n: "Karın Mekik", v: "X 20", i: "fa-user-ninja"},
              {n: "Dağ Tırmanışı", v: "45 SN", i: "fa-mountain"},
              {n: "Squat", v: "X 25", i: "fa-person-walking-arrow-loop-left"}
          ]
        },
        { id: 2, name: "GÖĞÜS & TRICEPS", kcal: 450, time: 20,
          exercises: [
              {n: "Elmas Şınav", v: "X 12", i: "fa-gem"},
              {n: "Dips", v: "X 15", i: "fa-chair"},
              {n: "Diz Üstü Şınav", v: "X 20", i: "fa-person-praying"}
          ]
        },
        { id: 3, name: "KARIN KASLARI (6-PACK)", kcal: 280, time: 10,
          exercises: [
              {n: "Leg Raises", v: "X 15", i: "fa-up-long"},
              {n: "Russian Twist", v: "X 30", i: "fa-rotate"},
              {n: "Plank", v: "60 SN", i: "fa-clock"}
          ]
        }
    ];

    let user = JSON.parse(localStorage.getItem('elite_v1')) || { count: 0, kcal: 0, min: 0 };
    let currentW = null;
    let currentIdx = 0;

    function tts(txt) {
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'tr-TR'; msg.rate = 1;
        window.speechSynthesis.speak(msg);
    }

    function init() {
        const list = document.getElementById('list-render');
        list.innerHTML = "";
        workouts.forEach(w => {
            list.innerHTML += `
                <div class="card-elite glass-panel" onclick="startWorkout(${w.id})">
                    <div class="card-content">
                        <h3>${w.name}</h3>
                        <p>${w.kcal} KCAL • ${w.time} DAKİKA</p>
                    </div>
                </div>`;
        });
        document.getElementById('s-ex').innerText = user.count;
        document.getElementById('s-kcal').innerText = user.kcal;
        document.getElementById('s-min').innerText = user.min;
    }

    function startWorkout(id) {
        currentW = workouts.find(w => w.id === id);
        currentIdx = 0;
        document.getElementById('engine').style.display = 'flex';
        updateUI();
        tts(currentW.name + " antrenmanı başlıyor. İlk hareket " + currentW.exercises[0].n);
    }

    function updateUI() {
        const ex = currentW.exercises[currentIdx];
        document.getElementById('ex-name').innerText = ex.n;
        document.getElementById('ex-val').innerText = ex.v;
        document.getElementById('ex-icon').className = "fas " + ex.i;
        document.getElementById('step-txt').innerText = `${currentIdx + 1} / ${currentW.exercises.length}`;
        document.getElementById('p-bar').style.width = ((currentIdx + 1) / currentW.exercises.length) * 100 + "%";
    }

    function nextStep() {
        currentIdx++;
        if(currentIdx < currentW.exercises.length) {
            updateUI();
            tts("Sıradaki hareket " + currentW.exercises[currentIdx].n);
        } else {
            finish();
        }
    }

    function finish() {
        user.count++;
        user.kcal += currentW.kcal;
        user.min += currentW.time;
        localStorage.setItem('elite_v1', JSON.stringify(user));
        document.getElementById('engine').style.display = 'none';
        init();
        tts("Tebrikler şampiyon! Bir antrenmanı daha başarıyla tamamladın.");
        alert("EFSANESİN! ANTRENMAN BİTTİ.");
    }

    function stopWorkout() { if(confirm("Çıkmak istiyor musun?")) document.getElementById('engine').style.display = 'none'; }
    function resetAll() { if(confirm("Tüm veriler sıfırlansın mı?")) { localStorage.clear(); location.reload(); } }

    init();
</script>
</body>
</html>
