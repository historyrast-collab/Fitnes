<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITFORGE MASTER EDITION | NEURAL INTERFACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- BÖLÜM 1: SİBERNETİK TASARIM DİLİ (CSS) --- */
        :root {
            --neon-green: #39FF14;
            --neon-purple: #BC13FE;
            --neon-blue: #00D2FF;
            --titan-gold: #FFD700;
            --danger-red: #FF3131;
            --deep-black: #050505;
            --surface-dark: #0F0F0F;
            --steel-gray: #888888;
            --glass-bg: rgba(15, 15, 15, 0.8);
            --border-glow: 0 0 10px rgba(57, 255, 20, 0.2);
            --shadow-heavy: 0 10px 30px rgba(0,0,0,0.8);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--deep-black);
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            line-height: 1.6;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 1) 0%, rgba(5, 5, 5, 1) 100%),
                url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        }

        /* --- KAYDIRMA ÇUBUĞU (SCROLLBAR) --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--deep-black); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(var(--neon-green), var(--neon-purple)); 
            border-radius: 10px; 
        }

        /* --- ANA EKRAN (HUD) --- */
        #viewport {
            width: 100%;
            height: 40vh;
            position: relative;
            background: #000;
            overflow: hidden;
            border-bottom: 2px solid #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow-heavy);
        }

        #fitnessCanvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 15px rgba(57, 255, 20, 0.4));
        }

        .hud-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }

        .hud-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            margin: 0;
            letter-spacing: 3px;
        }

        /* --- KART SİSTEMİ (WIDGETS) --- */
        .container {
            max-width: 600px;
            margin: -40px auto 100px auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .widget {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-heavy);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .widget:hover {
            transform: translateY(-5px);
            border-color: var(--neon-green);
            box-shadow: var(--border-glow);
        }

        .widget::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* --- TİPOGRAFİ VE ETİKETLER --- */
        h2, h3 {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            margin-top: 0;
        }

        .label {
            font-size: 0.7rem;
            color: var(--steel-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 5px;
        }

        .value {
            font-size: 1.5rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
        }

        /* --- BUTONLAR (INTERACTIVE) --- */
        .btn {
            background: none;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .btn-purple { border-color: var(--neon-purple); color: var(--neon-purple); }
        .btn-purple:hover { background: var(--neon-purple); color: #fff; box-shadow: 0 0 20px var(--neon-purple); }

        .btn-gold { border-color: var(--titan-gold); color: var(--titan-gold); }
        .btn-gold:hover { background: var(--titan-gold); color: #000; box-shadow: 0 0 20px var(--titan-gold); }

        /* --- ANİMASYONLU ELEMENTLER --- */
        .pulse { animation: pulseAnim 2s infinite; }
        @keyframes pulseAnim {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1a1a1a;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--neon-green);
            width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--neon-green);
        }

        /* --- ADAPTOJEN VE BİLGİ KARTLARI --- */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .mini-card {
            background: rgba(255,255,255,0.02);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 480px) {
            .hud-title { font-size: 0.9rem; }
            .value { font-size: 1.2rem; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div class="hud-overlay">
            <p class="hud-title pulse">CORE_OS v4.2.0</p>
        </div>
        <canvas id="fitnessCanvas"></canvas>
    </div>

    <div class="container" id="app-render-target">
        </div>

    <script>
        /* --- BÖLÜM 2: MASTER ENGINE VE VERİ TABANI BURADAN BAŞLIYOR --- */
        /* [BURADAN DEVAM ET] */
        // --- MASTER STATE ARCHITECTURE (UYGULAMA HAFIZASI) ---
        /**
         * Uygulamanın tüm yaşam döngüsünü, kullanıcı gelişimini ve 
         * anlık biyometrik verilerini tutan merkezi kontrol objesi.
         */
        const state = {
            version: "1.0.0-MASTER",
            xp: 0,
            level: 1,
            water: 0,
            userWeight: 75,
            userAge: 25,
            isTraining: false,
            currentWorkout: null,
            lastSleepHours: 7,
            recoveryMultiplier: 1.0,
            lastRPE: 5,
            isMeditating: false,
            activeWorkoutSet: [],
            currentExerciseIndex: 0,
            pulseAnimSpeed: 1000,
            sessionVolume: 0
        };

        // --- GLOBAL VERİ BANKASI (200.000 KARAKTER HEDEFİ İÇİN GENİŞLETİLMİŞTİR) ---
        
        /**
         * KAPSAMLI ANTRENMAN KÜTÜPHANESİ
         * Her hareket için biyomekanik notlar ve ideal tekrar aralıkları.
         */
        const EXERCISE_LIBRARY = {
            "chest": [
                { id: "c1", name: "Diamond Push-ups", reps: "12-15", focus: "Inner Pectorals & Triceps", info: "Eller elmas şeklinde birleştirilir. Dirsekler gövdeye yakın tutulur." },
                { id: "c2", name: "Archer Push-ups", reps: "8-10", focus: "Unilateral Strength", info: "Vücut bir tarafa kaydırılarak tek kol üzerindeki yük artırılır." },
                { id: "c3", name: "Decline Push-ups", reps: "15-20", focus: "Upper Chest", info: "Ayaklar yüksek bir zemine konularak üst göğüs lifleri hedeflenir." },
                { id: "c4", name: "Wide Grip Push-ups", reps: "12-15", focus: "Outer Chest", info: "Eller omuz genişliğinden daha açık tutularak gerilim dışa verilir." }
            ],
            "wrist": [
                { id: "w1", name: "Finger Pulses", reps: "30-50", focus: "Grip Endurance", info: "Parmak uçlarında hızlı baskı uygulayarak tutuş gücü artırılır." },
                { id: "w2", name: "Wrist Rotations", reps: "60s", focus: "Carpal Stability", info: "Bilekler dairesel hareketlerle ısıtılır ve mobilize edilir." },
                { id: "w3", name: "Reverse Wrist Curls", reps: "20-25", focus: "Extensors", info: "Bileklerin dış kısmındaki kasları güçlendirmek için yukarı bükme yapılır." }
            ],
            "legs": [
                { id: "l1", name: "Bulgarian Split Squats", reps: "10-12", focus: "Quads & Glutes", info: "Arka ayak yüksekte tutularak tek bacak üzerine odaklanılır." },
                { id: "l2", name: "Jump Squats", reps: "15", focus: "Explosiveness", info: "Patlayıcı güç için squat sonrası dikey sıçrama yapılır." }
            ]
        };

        /**
         * HORMONAL VE NÖRO-BİYOLOJİK REHBER
         * Sporcu performansını etkileyen kimyasal süreçlerin detaylı analizi.
         */
        const BIO_DATABASE = {
            hormones: [
                { name: "Testosteron", role: "Anabolik İnşa", hacks: ["Ağır squat yap.", "D3 ve Çinko alımını artır.", "8 saat uyu."], alert: "Düşük testosteron yorgunluk ve kas kaybı yapar." },
                { name: "Kortizol", role: "Stres Kontrolü", hacks: ["Antrenmanı 60 dk ile sınırla.", "C vitamini tüket.", "Meditasyon yap."], alert: "Yüksek kortizol kas yakımına sebep olur." },
                { name: "İnsülin", role: "Besin Taşıyıcı", hacks: ["Karbonhidratı antrenman sonrasına sakla.", "Tarçın kullan."], alert: "İnsülin direnci yağlanmayı artırır." }
            ],
            adaptogens: [
                { name: "Ashwagandha", target: "Cortisol Reduction", science: "Stres hormonlarını %27 oranında dengelediği kanıtlanmıştır.", dose: "600mg" },
                { name: "Rhodiola Rosea", target: "Mental Fatigue", science: "Zihinsel yorgunluğu azaltarak antrenman süresini uzatır.", dose: "300mg" },
                { name: "Cordyceps", target: "VO2 Max", science: "Hücrelerin oksijen kullanım kapasitesini artırır.", dose: "1000mg" }
            ],
            neurotransmitters: {
                dopamine: { title: "Dopamin (Ödül)", strategy: "Mikro hedefler koy ve her set sonrası kendini onayla.", foods: ["Yumurta", "Badem"] },
                serotonin: { title: "Serotonin (Mod)", strategy: "Güneş ışığına maruz kal ve sosyal bağları koru.", foods: ["Hindi", "Muz"] },
                gaba: { title: "GABA (Sakinlik)", strategy: "Derin nefes egzersizleri ve magnezyum kullanımı.", foods: ["Kefir", "Turşu"] }
            }
        };

        // --- BİYOMETRİK HESAPLAMA MOTORLARI (THE ENGINES) ---

        /**
         * KARDİYO VE NABIZ MOTORU
         * Yaşa göre yağ yakımı ve performans bölgelerini hesaplar.
         */
        const CardioEngine = {
            calculateZones(age) {
                const mhr = 220 - age;
                return {
                    mhr: mhr,
                    warmup: { min: Math.round(mhr * 0.5), max: Math.round(mhr * 0.6) },
                    fatBurn: { min: Math.round(mhr * 0.6), max: Math.round(mhr * 0.7) },
                    aerobic: { min: Math.round(mhr * 0.7), max: Math.round(mhr * 0.8) },
                    anaerobic: { min: Math.round(mhr * 0.8), max: Math.round(mhr * 0.9) }
                };
            }
        };

        /**
         * UYKU VE ONARIM ANALİZÖRÜ
         * Uyku süresine göre hücresel onarım puanı üretir.
         */
        const RecoveryEngine = {
            getScore(hours) {
                const base = (hours / 8) * 100;
                let status = "OPTIMAL";
                let color = "var(--neon-green)";

                if (base < 60) { status = "CRITICAL"; color = "var(--danger-red)"; }
                else if (base < 85) { status = "RECOVERING"; color = "var(--titan-gold)"; }

                return { score: Math.min(base.toFixed(0), 100), status, color, deep: (hours * 0.25).toFixed(1) };
            }
        };

        /**
         * ANTRENMAN HACMİ (VOLUME) MOTORU
         * Progresif yüklenmeyi (Overload) takip eden sistem.
         */
        const VolumeEngine = {
            calculate(exercises) {
                // Basitleştirilmiş: Her set ortalama 12 tekrar ve 3 set üzerinden
                return exercises.length * 12 * 3;
            },
            getTrend() {
                const history = JSON.parse(localStorage.getItem('FITFORGE_LOG')) || [];
                if (history.length < 2) return { val: "N/A", color: "var(--steel-gray)" };
                const diff = history[0].volume - history[1].volume;
                return diff >= 0 ? { val: `+${diff}`, color: "var(--neon-green)" } : { val: diff, color: "var(--danger-red)" };
            }
        };

        /**
         * SESLİ ASİSTAN SİSTEMİ (VOICE SYNTHESIS)
         */
        const VoiceAssistant = {
            speak(text) {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'tr-TR';
                    utterance.rate = 1.0;
                    utterance.pitch = 0.9;
                    window.speechSynthesis.speak(utterance);
                }
            }
        };

        /* --- BÖLÜM 3: GÖRSEL MOTOR (CANVAS) VE UI RENDERER BURADAN BAŞLIYOR --- */
        /* [BURADAN DEVAM ET] */
        // --- BÖLÜM 3: GÖRSEL MOTOR (CANVAS) VE UI RENDERER ---

        /**
         * FITNESS CANVAS MOTORU
         * Arka planda çalışan biyometrik dalga formlarını ve 
         * sistem animasyonlarını yöneten grafik motoru.
         */
        const CanvasEngine = {
            ctx: null,
            canvas: null,
            particles: [],

            init() {
                this.canvas = document.getElementById('fitnessCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.animate();
            },

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = this.canvas.parentElement.offsetHeight;
            },

            drawGrid() {
                const ctx = this.ctx;
                ctx.strokeStyle = 'rgba(57, 255, 20, 0.05)';
                ctx.lineWidth = 1;
                const step = 40;

                for (let x = 0; x < this.canvas.width; x += step) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, this.canvas.height);
                    ctx.stroke();
                }
                for (let y = 0; y < this.canvas.height; y += step) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(this.canvas.width, y);
                    ctx.stroke();
                }
            },

            animate() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.drawGrid();

                // Biyometrik Dalga Formu (Pulse Wave)
                ctx.beginPath();
                ctx.strokeStyle = 'var(--neon-green)';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'var(--neon-green)';

                const time = Date.now() * 0.002;
                for (let x = 0; x < this.canvas.width; x++) {
                    const y = this.canvas.height / 2 + 
                              Math.sin(x * 0.02 + time) * 20 * Math.sin(time * 0.5);
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;

                requestAnimationFrame(() => this.animate());
            }
        };

        /**
         * MASTER UI RENDERER (DINAMIK ARAYÜZ İNŞAASI)
         * State üzerindeki verilere göre HTML elementlerini 
         * DOM'a enjekte eden fonksiyonlar grubu.
         */
        const UIRenderer = {
            target: null,

            init() {
                this.target = document.getElementById('app-render-target');
                this.refresh();
            },

            refresh() {
                this.target.innerHTML = '';
                this.renderStats();
                this.renderActionButtons();
                this.renderBioCards();
                this.renderWorkoutHistory();
            },

            renderStats() {
                const stats = `
                    <div class="widget">
                        <span class="label">OPERATÖR DURUMU</span>
                        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                            <div>
                                <span class="label">SEVİYE</span>
                                <div class="value" style="color: var(--neon-purple);">${state.level}</div>
                            </div>
                            <div style="text-align: center;">
                                <span class="label">XP</span>
                                <div class="value">${state.xp}</div>
                            </div>
                            <div style="text-align: right;">
                                <span class="label">SU (H2O)</span>
                                <div class="value" style="color: var(--neon-blue);">${state.water.toFixed(2)}L</div>
                            </div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${(state.xp % 1000) / 10}%"></div>
                        </div>
                    </div>
                `;
                this.target.innerHTML += stats;
            },

            renderActionButtons() {
                const actions = `
                    <div class="info-grid">
                        <div class="widget" style="margin-bottom: 0;">
                            <button class="btn" onclick="AppLogic.addWater()">SU EKLE (0.25L)</button>
                        </div>
                        <div class="widget" style="margin-bottom: 0;">
                            <button class="btn btn-purple" onclick="AppLogic.startSession()">ANTRENMAN</button>
                        </div>
                    </div>
                `;
                this.target.innerHTML += actions;
            },

            renderBioCards() {
                const hormone = BIO_DATABASE.hormones[Math.floor(Math.random() * BIO_DATABASE.hormones.length)];
                const adaptogen = BIO_DATABASE.adaptogens[Math.floor(Math.random() * BIO_DATABASE.adaptogens.length)];

                const bio = `
                    <div class="widget">
                        <h3>BİYOLOJİK ANALİZ</h3>
                        <div class="info-grid">
                            <div class="mini-card">
                                <span class="label">ODAK: ${hormone.name}</span>
                                <p style="font-size: 0.65rem; color: var(--steel-gray); margin: 5px 0;">${hormone.role}</p>
                                <div style="font-size: 0.6rem; color: var(--neon-green);">+ ${hormone.hacks[0]}</div>
                            </div>
                            <div class="mini-card">
                                <span class="label">ADAPTOJEN: ${adaptogen.name}</span>
                                <p style="font-size: 0.65rem; color: var(--steel-gray); margin: 5px 0;">${adaptogen.target}</p>
                                <div style="font-size: 0.6rem; color: var(--titan-gold);">${adaptogen.dose}</div>
                            </div>
                        </div>
                    </div>
                `;
                this.target.innerHTML += bio;
            },

            renderWorkoutHistory() {
                const history = JSON.parse(localStorage.getItem('FITFORGE_LOG')) || [];
                const trend = VolumeEngine.getTrend();
                
                let historyHtml = `
                    <div class="widget">
                        <h3>HACİM TRENDİ (VOLUME)</h3>
                        <div style="display: flex; align-items: center; justify-content: space-between;">
                            <div class="value" style="color: ${trend.color};">${trend.val}</div>
                            <div style="font-size: 0.7rem; color: var(--steel-gray);">SON 7 GÜN ANALİZİ</div>
                        </div>
                        <div style="margin-top: 15px;">
                            ${history.slice(0, 3).map(log => `
                                <div style="display: flex; justify-content: space-between; font-size: 0.7rem; border-bottom: 1px solid #1a1a1a; padding: 5px 0;">
                                    <span>${log.date}</span>
                                    <span style="color: var(--titan-gold);">${log.volume} VOL</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                this.target.innerHTML += historyHtml;
            }
        };

        // --- BÖLÜM 4: UYGULAMA MANTIĞI VE TETİKLEYİCİLER (LOGIC) ---
        
        const AppLogic = {
            addWater() {
                state.water += 0.25;
                state.xp += 10;
                VoiceAssistant.speak("Hidrasyon seviyesi artırıldı. Hücresel iletkenlik optimize ediliyor.");
                this.checkLevelUp();
                UIRenderer.refresh();
            },

            checkLevelUp() {
                const newLevel = Math.floor(state.xp / 1000) + 1;
                if (newLevel > state.level) {
                    state.level = newLevel;
                    VoiceAssistant.speak(`Tebrikler Operatör. Seviye ${state.level} onaylandı. Kapasite artırıldı.`);
                }
            },

            startSession() {
                const categories = Object.keys(EXERCISE_LIBRARY);
                const randomCat = categories[Math.floor(Math.random() * categories.length)];
                state.currentWorkout = randomCat;
                state.isTraining = true;
                
                VoiceAssistant.speak(`${randomCat.toUpperCase()} protokolü başlatıldı. Sistem odağı kas liflerine aktarılıyor.`);
                this.renderActiveWorkout();
            },

            renderActiveWorkout() {
                const exercises = EXERCISE_LIBRARY[state.currentWorkout];
                const target = document.getElementById('app-render-target');
                
                target.innerHTML = `
                    <div class="widget">
                        <h2 style="color: var(--neon-purple);">${state.currentWorkout} PROTOKOLÜ</h2>
                        <div id="workout-content">
                            ${exercises.map((ex, idx) => `
                                <div class="mini-card" style="margin-bottom: 10px; border-left: 3px solid var(--neon-green);">
                                    <div style="font-weight: bold; font-size: 0.9rem;">${ex.name}</div>
                                    <div style="font-size: 0.7rem; color: var(--titan-gold);">${ex.reps} | ${ex.focus}</div>
                                    <p style="font-size: 0.6rem; color: var(--steel-gray); margin: 5px 0;">${ex.info}</p>
                                </div>
                            `).join('')}
                        </div>
                        <button class="btn btn-gold" onclick="AppLogic.finishSession()">SEANSI TAMAMLA</button>
                    </div>
                `;
            },

            finishSession() {
                const exercises = EXERCISE_LIBRARY[state.currentWorkout];
                const vol = VolumeEngine.calculate(exercises);
                const gainedXp = 500;
                
                state.xp += gainedXp;
                state.isTraining = false;

                const log = {
                    date: new Date().toLocaleDateString(),
                    volume: vol,
                    type: state.currentWorkout
                };

                const history = JSON.parse(localStorage.getItem('FITFORGE_LOG')) || [];
                history.unshift(log);
                localStorage.setItem('FITFORGE_LOG', JSON.stringify(history));

                VoiceAssistant.speak(`Seans tamamlandı. ${vol} birim hacim kaydedildi. ${gainedXp} deneyim puanı aktarıldı.`);
                this.checkLevelUp();
                UIRenderer.refresh();
            }
        };

        /* --- BÖLÜM 5: FİNAL ENTEGRASYON VE BAŞLATICI BURADAN BAŞLIYOR --- */
        /* [BURADAN DEVAM ET] */
        // --- BÖLÜM 5: FİNAL ENTEGRASYON VE SİSTEM BAŞLATICI ---

        /**
         * EASTER EGG VE GİZLİ KOMUT SİSTEMİ
         * Konami Code: ↑ ↑ ↓ ↓ ← → tuş dizisi ile God Mode aktif edilir.
         */
        const SecretSystem = {
            konamiCode: ["ArrowUp", "ArrowUp", "ArrowDown", "ArrowDown", "ArrowLeft", "ArrowRight"],
            buffer: [],

            init() {
                document.addEventListener('keydown', (e) => {
                    this.buffer.push(e.key);
                    this.buffer = this.buffer.slice(-6);
                    
                    if (this.buffer.join('') === this.konamiCode.join('')) {
                        this.activateGodMode();
                    }
                });
            },

            activateGodMode() {
                state.xp += 100000;
                state.level = 99;
                document.body.style.filter = "hue-rotate(180deg) brightness(1.2)";
                document.querySelector('.hud-title').innerText = "GOD_MODE_ACTIVE";
                
                VoiceAssistant.speak("UYARI: Yetkisiz erişim algılandı. Tanrı modu aktif. Tüm sınırlar kaldırıldı.");
                UIRenderer.refresh();
            }
        };

        /**
         * UYKU VE ONARIM PANELI RENDERER
         * Günlük onarım verilerini ve REM/Derin uyku tahminlerini sunar.
         */
        const SleepUI = {
            render() {
                const recovery = RecoveryEngine.getScore(state.lastSleepHours);
                const target = document.getElementById('app-render-target');
                
                const sleepHtml = `
                    <div class="widget" style="border-bottom: 2px solid ${recovery.color};">
                        <h3>UYKU VE HÜCRESEL ONARIM</h3>
                        <div style="display: flex; justify-content: space-around; margin: 15px 0;">
                            <div style="text-align: center;">
                                <div class="value" style="font-size: 1.1rem;">%${recovery.score}</div>
                                <span class="label">PUAN</span>
                            </div>
                            <div style="text-align: center;">
                                <div class="value" style="font-size: 1.1rem; color: var(--neon-blue);">${recovery.deep}s</div>
                                <span class="label">DERİN</span>
                            </div>
                            <div style="text-align: center;">
                                <div class="value" style="font-size: 1.1rem; color: var(--neon-purple);">${state.lastSleepHours}s</div>
                                <span class="label">TOPLAM</span>
                            </div>
                        </div>
                        <div style="font-size: 0.65rem; color: ${recovery.color}; text-align: center; font-weight: bold;">
                            DURUM: ${recovery.status}
                        </div>
                    </div>
                `;
                target.innerHTML += sleepHtml;
            }
        };

        /**
         * MASTER ORCHESTRATOR (ANA BAŞLATICI)
         * Tüm modülleri sırasıyla uyandıran ve sistemi ayağa kaldıran fonksiyon.
         */
        const MasterOrchestrator = {
            init() {
                console.log("%c [SYSTEM] BOOTING FITFORGE MASTER EDITION... ", "color: #39FF14; font-weight: bold;");
                
                // 1. Veri Kayıtlarını Yükle
                this.loadState();
                
                // 2. Motorları Hazırla
                CanvasEngine.init();
                UIRenderer.init();
                SecretSystem.init();
                
                // 3. Ek Panelleri Enjekte Et
                SleepUI.render();
                
                // 4. Başlangıç Sinyali
                setTimeout(() => {
                    VoiceAssistant.speak("Sistem çevrimiçi. Operatör biyometrisi doğrulandı. Gelişime hazır mısın?");
                }, 1500);
            },

            loadState() {
                const saved = localStorage.getItem('FITFORGE_STATE');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    Object.assign(state, parsed);
                }
            },

            saveState() {
                localStorage.setItem('FITFORGE_STATE', JSON.stringify(state));
            }
        };

        // Uygulamayı Başlat
        window.onload = () => MasterOrchestrator.init();

        // Sayfa Kapanırken Kaydet
        window.onbeforeunload = () => MasterOrchestrator.saveState();

    </script>
</body>
</html>
