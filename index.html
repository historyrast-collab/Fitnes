<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="FitFlow Pro: Professional Home Workout Engine">
    <title>FITFLOW PRO | Master Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- BÖLÜM 1: TİCARİ UI STANDARTLARI VE SİSTEM TASARIMI --- */
        /* Bu bölüm uygulamanın tüm görsel temelini ve profesyonel mobil tepkiselliğini kurar. */
        
        :root {
            --p-color: #007AFF; /* Apple/Leap Standart Mavisi */
            --p-accent: #FF5722; /* Aksiyon Turuncusu */
            --bg-main: #F2F2F7; /* iOS Gri Arka Plan */
            --surface: #FFFFFF;
            --text-main: #1C1C1E;
            --text-sec: #8E8E93;
            --success: #34C759;
            --warning: #FF9500;
            --error: #FF3B30;
            --card-radius: 18px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --header-height: 70px;
            --nav-height: 80px;
            --shadow-soft: 0 10px 25px rgba(0,0,0,0.05);
            --shadow-hard: 0 20px 40px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* --- PROFESYONEL KAYDIRMA MOTORU --- */
        ::-webkit-scrollbar { width: 0px; background: transparent; } /* Mobil görünüm için gizli scroll */

        /* --- MASTER HEADER --- */
        header {
            height: var(--header-height);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .brand-logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--p-color), #5856D6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .user-profile-mini {
            width: 40px;
            height: 40px;
            background: var(--p-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3);
        }

        /* --- UYGULAMA İÇERİK MOTORU --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: calc(var(--nav-height) + 40px);
        }

        /* --- KATEGORİ VE ANTRENMAN KARTLARI --- */
        .section-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin: 10px 0 20px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title span {
            font-size: 0.85rem;
            color: var(--p-color);
            font-weight: 600;
        }

        .pro-card {
            background: var(--surface);
            border-radius: var(--card-radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .pro-card:active {
            transform: scale(0.96);
        }

        .pro-card.featured {
            background: linear-gradient(135deg, #1C1C1E 0%, #2C2C2E 100%);
            color: white;
        }

        .pro-card .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--p-accent);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .pro-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .pro-card p {
            font-size: 0.85rem;
            color: var(--text-sec);
            margin-bottom: 15px;
        }

        .stats-row {
            display: flex;
            gap: 15px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .featured .stat-item { color: rgba(255,255,255,0.7); }

        .stat-icon {
            width: 24px;
            height: 24px;
            margin-right: 6px;
            opacity: 0.8;
        }

        /* --- ALT NAVIGASYON (BOTTOM TAB BAR) --- */
        nav {
            height: var(--nav-height);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            position: fixed;
            bottom: 0;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 15px; /* iOS home indicator safe area */
        }

        .nav-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-sec);
            text-decoration: none;
            transition: var(--transition);
        }

        .nav-link.active {
            color: var(--p-color);
        }

        .nav-link i {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        .nav-link span {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* --- GENİŞLETİLMİŞ ANTRENMAN MODALI --- */
        #workout-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--surface);
            z-index: 5000;
            transform: translateY(100%);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        #workout-layer.active {
            transform: translateY(0);
        }
        /* --- BÖLÜM 2: MASTER DATA ENGINE & GLOBAL STATE --- */
        
        // --- PRO-GRADE STATE MANAGEMENT ---
        /**
         * Uygulamanın tüm yaşam döngüsünü, kullanıcı gelişimini, 
         * abonelik durumunu ve biyometrik verileri yöneten merkezi motor.
         */
        const ProState = {
            settings: {
                lang: 'tr',
                unit: 'kg',
                soundEnabled: true,
                isPremium: false,
                version: "1.0.0-PRO-BUILD"
            },
            user: {
                name: "Operatör",
                level: 1,
                xp: 0,
                dailyGoal: 30, // dakika
                completedToday: 0,
                weightHistory: [],
                workoutHistory: []
            },
            activeWorkout: {
                id: null,
                startTime: null,
                currentExerciseIndex: 0,
                isPaused: false,
                totalBurnedCalories: 0,
                heartRateSim: 75
            }
        };

        // --- DEV EGZERSİZ VE ANTRENMAN KÜTÜPHANESİ (JSON) ---
        /**
         * Her bir egzersiz için teknik detaylar, animasyon referansları 
         * ve kalori yakım katsayılarını içeren profesyonel veri bankası.
         */
        const MASTER_EXERCISE_DB = {
            exercises: [
                { id: "e1", name: "Standart Şınav", category: "Göğüs", difficulty: "Orta", met: 3.8, info: "Göğüs, omuz ve triceps kaslarını hedefler.", tips: "Sırtınızı düz tutun." },
                { id: "e2", name: "Elmas Şınav", category: "Triceps", difficulty: "Zor", met: 4.5, info: "İç göğüs ve triceps odaklıdır.", tips: "Ellerinizi kalp şeklinde birleştirin." },
                { id: "e3", name: "Geniş Şınav", category: "Dış Göğüs", difficulty: "Orta", met: 3.5, info: "Göğüs kafesinin dış kısımlarını geliştirir.", tips: "Elleri omuzdan daha geniş açın." },
                { id: "e4", name: "Yarım Şınav", category: "Göğüs", difficulty: "Kolay", met: 2.5, info: "Yeni başlayanlar için diz üstü versiyon.", tips: "Dizlerinizi yere koyarak yükü azaltın." },
                { id: "e5", name: "Mekik", category: "Karın", difficulty: "Orta", met: 3.0, info: "Üst karın kaslarını çalıştırır.", tips: "Boynunuzu çekmeyin, karnınızla kalkın." },
                { id: "e6", name: "Plank", category: "Core", difficulty: "Zor", met: 4.0, info: "Tüm vücut stabilizasyonunu sağlar.", tips: "Kalçanızın yukarı kalkmasına izin vermeyin." },
                { id: "e7", name: "Bicycle Crunches", category: "Abs/Obliques", difficulty: "Zor", met: 4.2, info: "Yan karın kaslarını hedefler.", tips: "Dirseğinizi zıt dize değdirin." },
                { id: "e8", name: "Leg Raises", category: "Alt Karın", difficulty: "Orta", met: 3.2, info: "Alt karın bölgesindeki yağlanmayı hedefler.", tips: "Bacakları yere değdirmeden indirin." },
                { id: "e9", name: "Squat", category: "Bacak", difficulty: "Orta", met: 5.0, info: "Alt vücudun temel güç hareketidir.", tips: "Ağırlığı topuklarınıza verin." },
                { id: "e10", name: "Lunge", category: "Bacak/Kalça", difficulty: "Orta", met: 4.5, info: "Kalça ve ön bacak odaklıdır.", tips: "Diziniz ayak parmak ucunu geçmesin." },
                { id: "e11", name: "Burpee", category: "Full Body", difficulty: "Extreme", met: 8.0, info: "Yüksek yoğunluklu kardiyo ve güç.", tips: "Patlayıcı bir sıçrama ekleyin." },
                { id: "e12", name: "Mountain Climbers", category: "Kardiyo", difficulty: "Zor", met: 6.0, info: "Kalp atış hızını artırır ve core çalıştırır.", tips: "Dizleri göğse hızlı çekin." }
            ],
            plans: [
                {
                    id: "p1",
                    title: "Tüm Vücut Başlangıç",
                    desc: "7 gün sürecek temel yağ yakımı ve güç programı.",
                    duration: "15 Dakika",
                    intensity: "Düşük",
                    exercises: ["e1", "e5", "e9", "e6", "e10"]
                },
                {
                    id: "p2",
                    title: "Abs Warrior",
                    desc: "Sert ve belirgin karın kasları için yoğun program.",
                    duration: "10 Dakika",
                    intensity: "Yüksek",
                    exercises: ["e5", "e7", "e8", "e6", "e12"]
                },
                {
                    id: "p3",
                    title: "Göğüs Canavarı",
                    desc: "Geniş ve güçlü göğüs kasları inşa edin.",
                    duration: "20 Dakika",
                    intensity: "Orta",
                    exercises: ["e1", "e2", "e3", "e4", "e11"]
                }
            ]
        };

        // --- CALORIE & BIOMETRIC ENGINE ---
        /**
         * Kullanıcının yakacağı kaloriyi MET değerleri ve süre 
         * üzerinden bilimsel formülle hesaplayan motor.
         */
        const BioEngine = {
            calculateBurn(met, weight, durationSec) {
                // Formül: (MET * 3.5 * weight) / 200 * (durationSec / 60)
                const calories = (met * 3.5 * weight) / 200 * (durationSec / 60);
                return parseFloat(calories.toFixed(2));
            },
            
            getHeartRate(isTraining) {
                return isTraining ? 
                    Math.floor(Math.random() * (160 - 130 + 1) + 130) : 
                    Math.floor(Math.random() * (85 - 65 + 1) + 65);
            }
        };

        // --- PROFESSIONAL VOICE ENGINE ---
        const VoiceEngine = {
            synth: window.speechSynthesis,
            speak(text) {
                if (ProState.settings.soundEnabled) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'tr-TR';
                    utterance.rate = 1.1;
                    this.synth.speak(utterance);
                }
            },
            countdown(seconds) {
                if(seconds > 0) {
                    this.speak(seconds.toString());
                }
            }
        };

        // --- STORAGE MANAGER ---
        const StorageManager = {
            save() {
                localStorage.setItem('FITFLOW_PRO_DATA', JSON.stringify(ProState));
            },
            load() {
                const data = localStorage.getItem('FITFLOW_PRO_DATA');
                if (data) {
                    const parsed = JSON.parse(data);
                    Object.assign(ProState, parsed);
                }
            }
        };

        /* --- BÖLÜM 3: UI RENDER ENGINE (DYNAMIC DOM) BURADAN BAŞLIYOR --- */
                /* --- BÖLÜM 3: UI RENDER ENGINE & DASHBOARD ARCHITECTURE --- */

        /**
         * MASTER UI RENDERER
         * State ve Veri Bankası arasındaki köprüyü kuran, 
         * DOM elementlerini profesyonel standartlarda inşa eden motor.
         */
        const UIRenderer = {
            mainTarget: null,
            navTarget: null,

            init() {
                this.mainTarget = document.getElementById('main-view');
                this.renderDashboard();
                this.renderNavigation();
                this.attachGlobalEvents();
            },

            /**
             * ANA DASHBOARD İNŞAASI
             * Kullanıcının günlük ilerlemesini ve önerilen antrenmanları gösterir.
             */
            renderDashboard() {
                this.mainTarget.innerHTML = `
                    <div class="fade-in">
                        <section id="daily-summary" style="margin-bottom: 30px;">
                            <div class="pro-card featured">
                                <span class="badge">BUGÜN</span>
                                <h3 style="color: white; font-size: 1.5rem;">Hoş Geldin, ${ProState.user.name}</h3>
                                <p style="color: rgba(255,255,255,0.7);">Günlük hedefine ulaşmak için 15 dakikan kaldı.</p>
                                <div class="progress-bar" style="height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin: 15px 0;">
                                    <div class="progress-fill" style="width: ${(ProState.user.completedToday / ProState.user.dailyGoal) * 100}%; background: var(--p-accent); height: 100%; border-radius: 4px; box-shadow: 0 0 15px var(--p-accent);"></div>
                                </div>
                                <div class="stats-row">
                                    <div class="stat-item">
                                        <span style="color: var(--p-accent); margin-right: 5px;">⚡</span> 
                                        ${ProState.user.xp} XP
                                    </div>
                                    <div class="stat-item">
                                        <span style="color: #34C759; margin-right: 5px;">🔥</span> 
                                        145 Kcal
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section id="training-categories">
                            <div class="section-title">
                                ANTRENMANLAR <span>Tümünü Gör</span>
                            </div>
                            <div id="workout-list">
                                ${MASTER_EXERCISE_DB.plans.map(plan => this.createWorkoutCard(plan)).join('')}
                            </div>
                        </section>

                        <section id="quick-actions" style="margin-top: 30px;">
                            <div class="section-title">HIZLI ERİŞİM</div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                <div class="pro-card" style="padding: 15px; text-align: center;">
                                    <div style="font-size: 1.5rem; margin-bottom: 5px;">💧</div>
                                    <div style="font-size: 0.7rem; font-weight: 700;">SU TAKİBİ</div>
                                </div>
                                <div class="pro-card" style="padding: 15px; text-align: center;">
                                    <div style="font-size: 1.5rem; margin-bottom: 5px;">📏</div>
                                    <div style="font-size: 0.7rem; font-weight: 700;">BMI ÖLÇER</div>
                                </div>
                            </div>
                        </section>
                    </div>
                `;
            },

            /**
             * ANTRENMAN KARTI OLUŞTURUCU
             * Veritabanındaki planları görsel kartlara dönüştürür.
             */
            createWorkoutCard(plan) {
                return `
                    <div class="pro-card" onclick="WorkoutController.preview('${plan.id}')">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div>
                                <h3>${plan.title}</h3>
                                <p>${plan.desc}</p>
                            </div>
                            <div style="background: var(--bg-main); padding: 8px; border-radius: 12px;">
                                <span style="font-size: 0.7rem; font-weight: 800; color: var(--p-color);">${plan.intensity}</span>
                            </div>
                        </div>
                        <div class="stats-row" style="margin-top: 10px;">
                            <div class="stat-item">⏱️ ${plan.duration}</div>
                            <div class="stat-item">💪 ${plan.exercises.length} Egzersiz</div>
                        </div>
                    </div>
                `;
            },

            /**
             * ALT NAVIGASYON RENDER
             */
            renderNavigation() {
                // Navigasyon zaten HTML'de statik ama dinamik kontrolleri buradan yönetilir
                const navLinks = document.querySelectorAll('.nav-link');
                navLinks.forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        navLinks.forEach(l => l.classList.remove('active'));
                        link.classList.add('active');
                        // Sayfa değiştirme mantığı buraya gelecek
                    });
                });
            },

            /**
             * KÜRESEL OLAY DİNLEYİCİLERİ
             */
            attachGlobalEvents() {
                // Pull-to-refresh simülasyonu veya haptic feedback tetikleyicileri
                window.addEventListener('scroll', () => {
                    const header = document.querySelector('header');
                    if (window.scrollY > 20) {
                        header.style.boxShadow = "0 4px 20px rgba(0,0,0,0.1)";
                    } else {
                        header.style.boxShadow = "none";
                    }
                });
            }
        };

        /* --- BÖLÜM 4: WORKOUT CONTROLLER & ANIMATION ENGINE BURADAN BAŞLIYOR --- */
                /* --- BÖLÜM 4: WORKOUT CONTROLLER & REAL-TIME ENGINE --- */

        /**
         * WORKOUT CONTROLLER
         * Antrenman seanslarını yöneten, zamanlayıcıları senkronize eden 
         * ve kullanıcı etkileşimlerini (Duraklat, Geç, Bitir) kontrol eden motor.
         */
        const WorkoutController = {
            activePlan: null,
            timer: null,
            remainingTime: 0,
            currentIndex: 0,
            isResting: false,

            /**
             * ANTRENMAN ÖNİZLEME (PREVIEW)
             * Antrenmana başlamadan önce egzersiz listesini gösteren modalı hazırlar.
             */
            preview(planId) {
                this.activePlan = MASTER_EXERCISE_DB.plans.find(p => p.id === planId);
                if (!this.activePlan) return;

                const modal = document.getElementById('workout-layer');
                modal.classList.add('active');
                
                let exerciseListHtml = this.activePlan.exercises.map(exId => {
                    const ex = MASTER_EXERCISE_DB.exercises.find(e => e.id === exId);
                    return `
                        <div class="pro-card" style="margin-bottom: 10px; padding: 15px; background: var(--bg-main);">
                            <div style="display: flex; align-items: center;">
                                <div style="width: 50px; height: 50px; background: #ddd; border-radius: 10px; margin-right: 15px;"></div>
                                <div>
                                    <h4 style="font-size: 0.9rem;">${ex.name}</h4>
                                    <p style="font-size: 0.7rem; margin: 0;">${ex.difficulty} | ${ex.met} MET</p>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                modal.innerHTML = `
                    <div style="padding: 25px; flex: 1; overflow-y: auto;">
                        <div onclick="WorkoutController.close()" style="font-size: 1.5rem; margin-bottom: 20px; cursor: pointer;">✕</div>
                        <h2 style="font-size: 2rem; font-weight: 900; margin-bottom: 10px;">${this.activePlan.title}</h2>
                        <p style="color: var(--text-sec); margin-bottom: 30px;">${this.activePlan.desc}</p>
                        
                        <div class="section-title">EGZERSİZLER (${this.activePlan.exercises.length})</div>
                        ${exerciseListHtml}
                    </div>
                    <div style="padding: 20px; border-top: 1px solid #eee;">
                        <button class="btn-primary" onclick="WorkoutController.start()" style="width: 100%; padding: 18px; background: var(--p-color); color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 1.1rem; cursor: pointer; box-shadow: 0 10px 20px rgba(0,122,255,0.3);">BAŞLA</button>
                    </div>
                `;
            },

            close() {
                document.getElementById('workout-layer').classList.remove('active');
                this.resetEngine();
            },

            /**
             * SEANSI BAŞLAT
             * Geri sayımı ve ilk egzersizi tetikler.
             */
            start() {
                this.currentIndex = 0;
                this.isResting = false;
                VoiceEngine.speak("Hazırlan! Antrenman başlıyor.");
                this.renderExercise();
            },

            renderExercise() {
                const exId = this.activePlan.exercises[this.currentIndex];
                const ex = MASTER_EXERCISE_DB.exercises.find(e => e.id === exId);
                const modal = document.getElementById('workout-layer');
                
                this.remainingTime = 30; // Her egzersiz standart 30 saniye
                this.startTimer();

                modal.innerHTML = `
                    <div class="exercise-display fade-in" style="height: 100%; display: flex; flex-direction: column; padding: 40px 25px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-weight: 800; color: var(--p-color);">${this.currentIndex + 1} / ${this.activePlan.exercises.length}</span>
                            <div onclick="WorkoutController.close()" style="font-size: 1.2rem; cursor: pointer;">✕</div>
                        </div>
                        
                        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <div id="exercise-anim-placeholder" style="width: 250px; height: 250px; background: #f0f0f0; border-radius: 50%; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; font-size: 4rem;">💪</div>
                            <h2 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 10px;">${ex.name}</h2>
                            <p style="color: var(--p-color); font-weight: 700;">00:${this.remainingTime < 10 ? '0' : ''}${this.remainingTime}</p>
                            
                            <div class="timer-circle" id="main-timer-display">${this.remainingTime}</div>
                        </div>

                        <div style="display: flex; gap: 15px;">
                            <button onclick="WorkoutController.togglePause()" id="pause-btn" style="flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #eee; background: white; font-weight: 700;">DURAKLAT</button>
                            <button onclick="WorkoutController.next()" style="flex: 1; padding: 15px; border-radius: 12px; border: none; background: var(--bg-main); font-weight: 700;">ATLA</button>
                        </div>
                    </div>
                `;

                        this.remainingTime--;
                        document.getElementById('main-timer-display').innerText = this.remainingTime;

                        this.next();
                    }
                }, 1000);

                const btn = document.getElementById('pause-btn');

                    clearInterval(this.timer);
                    this.timer = null;

                clearInterval(this.timer);
                if (this.currentIndex < this.activePlan.exercises.length - 1) {

        /**
         * ANALYTICS ENGINE
         * Kullanıcı verilerini biyometrik standartlara göre analiz eden 
         * ve gelişim raporları oluşturan matematiksel motor.
         */
        const AnalyticsEngine = {
            /**
             * BMI (VÜCUT KİTLE İNDEKSİ) HESAPLAYICI
             * Formül: kg / m^2
             */
            calculateBMI(weight, height) {
                const heightInMeters = height / 100;
                const bmi = weight / (heightInMeters * heightInMeters);
                return {
                    value: bmi.toFixed(1),
                    status: this.getBMIStatus(bmi),
                    color: this.getBMIColor(bmi)
                };
            },

            getBMIStatus(bmi) {
                if (bmi < 18.5) return "Zayıf";
                if (bmi < 25) return "Normal";
                if (bmi < 30) return "Fazla Kilolu";
                return "Obez";
            },

            getBMIColor(bmi) {
                if (bmi < 18.5) return "#5AC8FA"; // Light Blue
                if (bmi < 25) return "#34C759";    // Success Green
                if (bmi < 30) return "#FFCC00";    // Warning Yellow
                return "#FF3B30";                  // Danger Red
            },

            /**
             * HAFTALIK ÖZET GENERATOR
             * Son 7 gündeki antrenman verilerini toplar.
             */
            getWeeklySummary() {
                const history = ProState.user.workoutHistory || [];
                const last7Days = history.filter(h => {
                    const date = new Date(h.date);
                    const now = new Date();
                    return (now - date) / (1000 * 60 * 60 * 24) <= 7;
                });

                return {
                    totalWorkouts: last7Days.length,
                    totalMinutes: last7Days.reduce((sum, h) => sum + h.duration, 0),
                    totalCalories: last7Days.reduce((sum, h) => sum + h.calories, 0)
                };
            }
        };

        /**

         * Kullanıcının günlük su ihtiyacını kilosuna göre hesaplar 
         * ve tüketim verilerini milisaniyelik hassasiyetle kaydeder.
         */
        const HydrationEngine = {
            /**
             * İDEAL SU İHTİYACI HESABI
             * Formül: Kilo * 0.033 (Litre cinsinden)
             */
            calculateTarget() {
                const latestWeight = ProState.user.weightHistory.length > 0 
                    ? ProState.user.weightHistory[ProState.user.weightHistory.length - 1].value 
                    : 70;
                return (latestWeight * 0.033).toFixed(1);
            },

            addWater(amountMl) {
                const amountL = amountMl / 1000;
                ProState.user.completedWater = (ProState.user.completedWater || 0) + amountL;
                
                // Başarı Hissi İçin Sesli Geri Bildirim
                const percent = Math.floor((ProState.user.completedWater / this.calculateTarget()) * 100);
                if (percent >= 100 && percent < 105) {
                    VoiceEngine.speak("Harika! Günlük su hedefine ulaştın. Vücudun sana teşekkür ediyor.");
                } else {
                    VoiceEngine.speak(`${amountMl} mililitre eklendi.`);
                }

                StorageManager.save();
                this.updateUI();
            },

            updateUI() {
                const target = document.getElementById('water-progress-display');
                if (target) {
                    const current = ProState.user.completedWater || 0;
                    const goal = this.calculateTarget();
                    const percent = Math.min((current / goal) * 100, 100);
                    
                    target.innerHTML = `

        /**

         * Zaman içindeki kilo değişimini analiz eder ve

         */
        const WeightEngine = {
            addEntry(newValue) {
                const entry = {
                    date: new Date().toISOString(),
                    value: parseFloat(newValue)
                };
                ProState.user.weightHistory.push(entry);
                StorageManager.save();
                VoiceEngine.speak("Yeni kilo kaydı başarıyla eklendi.");
                ViewController.switchTab('report'); // Rapor sayfasına yönlendir
            },

            getTrend() {
                const history = ProState.user.weightHistory;
                if (history.length < 2) return "Veri Bekleniyor";
                
                const last = history[history.length - 1].value;
                const prev = history[history.length - 2].value;
                const diff = (last - prev).toFixed(1);
                
                return diff > 0 ? `+${diff} kg 📈` : `${diff} kg 📉`;
            }
        };

                const target = document.getElementById(targetId);
                if (!target) return;

                const now = new Date();
                const year = now.getFullYear();
                const month = now.getFullYear();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                let calendarHtml = `
                    <div class="pro-card" style="padding: 15px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                            <h3 style="font-size: 0.9rem;">${this.months[new Date().getMonth()]} ${year}</h3>

                            ${this.generateEmptyDays(firstDay)}
                            ${this.generateMonthDays(daysInMonth)}
                        </div>
                    </div>

                target.innerHTML = calendarHtml;
            },

            generateEmptyDays(count) {
                let html = '';
                for (let i = 0; i < count; i++) html += '<div></div>';
                return html;
            },

            generateMonthDays(count) {
                let html = '';
                const history = ProState.user.workoutHistory || [];
                const today = new Date().getDate();

                for (let i = 1; i <= count; i++) {
                    const hasWorkout = history.some(h => new Date(h.date).getDate() === i);
                    const isToday = i === today;
                    
                    html += `
                        <div style="

                            padding: 8px 0; 
                            border-radius: 8px; 
                            ${hasWorkout ? 'background: var(--p-color); color: white;' : ''}

         * STREAK ENGINE (SERİ TAKİPÇİSİ)
         * Kullanıcının üst üste kaç gün antrenman yaptığını hesaplar.
         * Ticari uygulamalarda "bağımlılık" yaratan ana unsurdur.
         */
        const StreakEngine = {
            calculate() {
                const history = ProState.user.workoutHistory || [];
                if (history.length === 0) return 0;

                let streak = 0;
                let checkDate = new Date();
                checkDate.setHours(0, 0, 0, 0);

                // Basitleştirilmiş streak mantığı
                const workoutDates = history.map(h => {
                    const d = new Date(h.date);
                    d.setHours(0,0,0,0);
                    return d.getTime();
                });

                while (workoutDates.includes(checkDate.getTime())) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                }
                return streak;
            },

            renderWidget(targetId) {
                const target = document.getElementById(targetId);
                if (!target) return;

                const currentStreak = this.calculate();
                target.innerHTML = `

            /**
             * TOAST NOTIFICATION (PROFESYONEL UYARI)
             * Ekranın üst kısmında pürüzsüzce beliren ticari uyarı penceresi.
             */
            show(message, type = 'info', duration = 4000) {
                const toast = document.createElement('div');
                toast.className = 'fade-in';
                toast.style = `
                    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
                    background: ${this.getColor(type)}; color: white; padding: 12px 25px;
                    border-radius: 30px; font-weight: 600; font-size: 0.85rem; z-index: 10000;
                    box-shadow: 0 10px 25px rgba(0,0,0,0.15); display: flex; align-items: center;
                    min-width: 280px; justify-content: center;
                `;
                
                const icon = type === 'success' ? '✅' : type === 'warning' ? '⚠️' : '🔔';
                toast.innerHTML = `<span style="margin-right: 10px;">${icon}</span> ${message}`;
                
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.5s ease';
                    setTimeout(() => toast.remove(), 500);
                }, duration);
            },

            getColor(type) {
                switch(type) {
                    case 'success': return 'var(--success)';
                    case 'warning': return 'var(--warning)';
                    case 'error': return 'var(--error)';
                    default: return 'var(--p-color)';

        /**
         * DATA GUARD (VERİ KORUMA PROTOKOLÜ)
         * Kullanıcı verilerini yerel hafızaya yazmadan önce bütünlük kontrolü 
         * yapar ve verilerin manipüle edilmesini engeller.
         */
        const DataGuard = {
            checksum(data) {
                // Basit bir veri doğrulama imzası oluşturur
                const str = JSON.stringify(data);
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    hash = ((hash << 5) - hash) + str.charCodeAt(i);
                    hash |= 0; 
                }
                return hash.toString();
            },

            secureSave(data) {
                const payload = {
                    content: data,
                    signature: this.checksum(data),
                    timestamp: new Date().getTime()
                };
                localStorage.setItem('FITFLOW_PRO_SECURE_STORAGE', JSON.stringify(payload));
                console.log("[DATA GUARD] Veri mühürlendi ve kaydedildi.");
            },

            secureLoad() {
                const raw = localStorage.getItem('FITFLOW_PRO_SECURE_STORAGE');
                if (!raw) return null;

                try {
                    const payload = JSON.parse(raw);
                    if (this.checksum(payload.content) === payload.signature) {
                        return payload.content;
                    } else {
                        throw new Error("Veri bütünlüğü bozulmuş! İmza eşleşmiyor.");
                    }
                } catch (e) {
                    DebugLogMaster.error("SECURE_LOAD_FAIL", e.message);
                    return null;
                }
            }
        };

            restoreFromSnapshot() {
                const snapshot = localStorage.getItem('FITFLOW_PRO_SNAPSHOT');
                if (snapshot) {
                    Object.assign(ProState, JSON.parse(snapshot));
                    StorageManager.save();

                    setTimeout(() => location.reload(), 1500);

                }
            }
        };

        const DebugLogMaster = {

        const AnimationLibrary = {

             * Antrenman bittiğinde veya seviye atlandığında ekranda

            fireConfetti() {

                    const confetti = document.createElement('div');

                        pointer-events: none;
                        transform: rotate(${Math.random() * 360}deg);
                    `;
                    document.body.appendChild(confetti);

                    const animation = confetti.animate([
                        { transform: `translate3d(0, 0, 0) rotate(0deg)`, opacity: 1 },
                        { transform: `translate3d(${Math.random() * 100 - 50}px, 100vh, 0) rotate(${Math.random() * 1000}deg)`, opacity: 0 }
                    ], {
                        duration: 2000 + Math.random() * 3000,
                        easing: 'cubic-bezier(0, .9, .57, 1)'
                    });

                    animation.onfinish = () => confetti.remove();
                }
            },

            /**
             * HAPTIC FEEDBACK SIMULATOR
             * Mobil cihazlardaki titreşim motorunu (Taptic Engine) 
             * kullanarak fiziksel geri bildirim hissi yaratır.
             */
            haptic(type = 'light') {
                if (!("vibrate" in navigator)) return;
                
                switch(type) {
                    case 'light': navigator.vibrate(10); break;
                    case 'medium': navigator.vibrate(30); break;
                    case 'success': navigator.vibrate([10, 30, 10]); break;
                    case 'error': navigator.vibrate([50, 100, 50]); break;
                }
            },

            /**
             * SHAKE EFFECT
             * Hatalı girişlerde veya kilitli içeriklere tıklandığında 
             * ilgili elementi sarsarak kullanıcıyı uyarır.

            shake(elementId) {
                const el = document.getElementById(elementId);
                if (!el) return;
                
                el.animate([

                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0)' }

                this.haptic('error');
            }
