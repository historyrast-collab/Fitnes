<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITFORGE SUPREME | Pro Home Workout</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757; --secondary: #2ed573; --dark: #000000; --card: #121212;
            --accent: #5352ed; --text: #ffffff; --muted: #a4b0be; --grad: linear-gradient(135deg, #ff4757, #ff6b81);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--text);
            margin: 0; padding-bottom: 100px; overflow-x: hidden;
        }

        /* --- DASHBOARD UI --- */
        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 32px; }
        .header { padding: 60px 25px 30px; background: linear-gradient(180deg, #1e1e1e 0%, var(--dark) 100%); }
        .header h1 { font-family: 'Syncopate', sans-serif; font-size: 24px; letter-spacing: 3px; margin: 0; color: var(--primary); }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 20px; margin-top: -30px; }
        .stat-item { padding: 20px 10px; text-align: center; }
        .stat-item b { display: block; font-size: 20px; font-weight: 800; color: #fff; }
        .stat-item span { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

        /* --- HEATMAP --- */
        .map-box { margin: 25px 20px; padding: 25px; text-align: center; position: relative; }
        .human-svg { width: 130px; fill: #222; transition: 0.8s; }
        .active-part { fill: var(--secondary) !important; filter: drop-shadow(0 0 10px var(--secondary)); }

        /* --- WORKOUT LIST --- */
        .list-container { padding: 0 20px; margin-bottom: 30px; }
        .card-pro { 
            display: flex; align-items: center; gap: 20px; padding: 20px; margin-bottom: 15px; 
            cursor: pointer; transition: 0.3s; position: relative; overflow: hidden;
        }
        .card-pro:active { transform: scale(0.96); }
        .icon-box { width: 60px; height: 60px; border-radius: 18px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--primary); }
        .info-box h3 { margin: 0; font-size: 16px; font-weight: 700; }
        .info-box p { margin: 5px 0 0; font-size: 12px; color: var(--muted); }

        /* --- SUPREME ENGINE (MODAL) --- */
        #supreme-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark);
            z-index: 10000; display: none; flex-direction: column;
        }
        .progress-top { height: 6px; background: #111; width: 100%; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; }
        
        .engine-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .visual-container { width: 100%; height: 260px; border-radius: 40px; background: #0a0a0a; margin-bottom: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid #111; }
        .ex-name { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .ex-val { font-size: 64px; font-weight: 900; color: var(--primary); font-family: 'Syncopate'; }

        /* --- REST OVERLAY --- */
        #rest-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--secondary);
            z-index: 11000; display: none; flex-direction: column; align-items: center; justify-content: center; color: #000;
        }
        .rest-clock { font-size: 120px; font-weight: 900; margin: 20px 0; font-family: 'Syncopate'; }

        /* --- NAVIGATION --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 30px 0; border-top: 1px solid #111;
        }
        .nav-link { color: #444; font-size: 22px; transition: 0.3s; }
        .nav-link.active { color: var(--primary); }

        .btn-main {
            background: var(--grad); color: #fff; border: none; padding: 22px; border-radius: 25px;
            width: 85%; font-weight: 800; font-size: 18px; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.3);
        }

        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="p-home" class="page fade-in">
    <div class="header">
        <h1>FITFORGE <span style="color:#fff">SUPREME</span></h1>
        <p style="font-size: 10px; color: var(--muted); margin-top: 5px; font-weight: 700; letter-spacing: 2px;">V1.0 PRO EDITION</p>
    </div>

    <div class="stat-grid">
        <div class="stat-item glass">
            <b id="user-count">0</b>
            <span>Egzersiz</span>
        </div>
        <div class="stat-item glass">
            <b id="user-kcal">0</b>
            <span>Kcal</span>
        </div>
        <div class="stat-item glass">
            <b id="user-min">0</b>
            <span>Dakika</span>
        </div>
    </div>

    <div class="map-box glass">
        <span style="font-size: 10px; font-weight: 800; color: var(--secondary); letter-spacing: 2px;">AKTİF KAS GRUPLARI</span>
        <div style="margin-top: 20px;">
            <svg class="human-svg" viewBox="0 0 100 200">
                <circle cx="50" cy="20" r="15" />
                <rect id="mus-chest" x="35" y="40" width="30" height="30" rx="5" />
                <rect id="mus-arm-l" x="15" y="40" width="15" height="60" rx="5" />
                <rect id="mus-arm-r" x="70" y="40" width="15" height="60" rx="5" />
                <rect id="mus-abs" x="40" y="75" width="20" height="30" rx="2" />
                <rect id="mus-leg-l" x="35" y="110" width="12" height="70" rx="5" />
                <rect id="mus-leg-r" x="53" y="110" width="12" height="70" rx="5" />
            </svg>
        </div>
    </div>

    <div class="list-container">
        <h2 style="font-size: 18px; margin-bottom: 20px;">Antrenman Seç</h2>
        <div id="workout-render"></div>
    </div>
</div>

<div id="p-tools" class="page hidden fade-in">
    <div style="padding: 80px 25px;">
        <h2 style="font-family:'Syncopate'; color:var(--primary)">ANALİZ MERKEZİ</h2>
        <div class="glass" style="padding:30px; margin-top:20px;">
            <h3 style="margin:0 0 20px 0;">VKE Hesapla</h3>
            <input type="number" id="h" placeholder="Boy (cm)" style="width:100%; padding:20px; background:#000; border:1px solid #222; color:#fff; border-radius:15px; margin-bottom:15px;">
            <input type="number" id="w" placeholder="Kilo (kg)" style="width:100%; padding:20px; background:#000; border:1px solid #222; color:#fff; border-radius:15px; margin-bottom:20px;">
            <button class="btn-main" onclick="calcBMI()" style="width:100%; margin:0;">HESAPLA</button>
            <p id="bmi-res" style="margin-top:20px; font-weight:800; font-size:18px;"></p>
        </div>
    </div>
</div>

<div id="supreme-modal">
    <div class="progress-top"><div class="progress-bar" id="p-bar"></div></div>
    <div style="padding: 20px; display:flex; justify-content:space-between; align-items:center;">
        <i class="fas fa-times" onclick="closeEngine()" style="font-size:24px;"></i>
        <div style="font-weight:800; color:var(--muted)" id="step-info">1 / 10</div>
    </div>
    <div class="engine-body">
        <div class="visual-container">
            <i id="ex-icon" class="fas fa-running" style="font-size:100px; color:#1a1a1a;"></i>
        </div>
        <div class="ex-name" id="ex-name">HAZIRLAN</div>
        <div class="ex-val" id="ex-val">00</div>
        <div style="width:100%; margin-top:40px;">
            <button class="btn-main" onclick="nextStep()">BİTTİ</button>
        </div>
    </div>
</div>

<div id="rest-overlay">
    <h2 style="font-family:'Syncopate'; letter-spacing:5px;">DİNLEN</h2>
    <div class="rest-clock" id="rest-clock">20</div>
    <p id="next-label" style="font-weight:700; font-size:18px;">Sıradaki: Şınav</p>
    <button onclick="skipRest()" style="margin-top:30px; background:none; border:2px solid #000; padding:12px 40px; border-radius:30px; font-weight:900;">ATLA</button>
</div>

<div class="bottom-nav">
    <div class="nav-link active" onclick="nav('home', this)"><i class="fas fa-grip-vertical"></i></div>
    <div class="nav-link" onclick="nav('tools', this)"><i class="fas fa-chart-bar"></i></div>
    <div class="nav-link" onclick="reset()"><i class="fas fa-sync"></i></div>
</div>

<script>
    // --- DATABASE ---
    const workouts = [
        { id: 1, name: "Tüm Vücut Yıkımı", kcal: 250, min: 15, m: "abs",
          steps: [
              {n: "Jumping Jacks", v: "X 30", icon: "fa-person-walking-arrow-right"},
              {n: "Klasik Şınav", v: "X 15", icon: "fa-hand-fist"},
              {n: "Squat", v: "X 20", icon: "fa-child-reaching"},
              {n: "Plank", v: "45 SN", icon: "fa-clock"}
          ]
        },
        { id: 2, name: "Çelik Göğüs & Kol", kcal: 320, min: 20, m: "chest",
          steps: [
              {n: "Geniş Şınav", v: "X 20", icon: "fa-arrows-left-right"},
              {n: "Elmas Şınav", v: "X 12", icon: "fa-gem"},
              {n: "Dips", v: "X 15", icon: "fa-chair"},
              {n: "Yumruk Şınavı", v: "X 10", icon: "fa-hand-fist"}
          ]
        },
        { id: 3, name: "Karın Kasları (ABS)", kcal: 180, min: 12, m: "abs",
          steps: [
              {n: "Mekik", v: "X 25", icon: "fa-user-ninja"},
              {n: "Dağ Tırmanışı", v: "40 SN", icon: "fa-mountain"},
              {n: "Bacak Kaldırma", v: "X 15", icon: "fa-up-long"}
          ]
        }
    ];

    let state = JSON.parse(localStorage.getItem('ff_supreme')) || { 
        count: 0, kcal: 0, min: 0, lastMus: '', doneIds: [] 
    };

    function tts(t) {
        const s = new SpeechSynthesisUtterance(t);
        s.lang = 'tr-TR'; s.rate = 0.9;
        window.speechSynthesis.speak(s);
    }

    function init() {
        const list = document.getElementById('workout-render');
        list.innerHTML = "";
        workouts.forEach(w => {
            list.innerHTML += `
                <div class="card-pro glass" onclick="start(${w.id})">
                    <div class="icon-box"><i class="fas fa-bolt"></i></div>
                    <div class="info-box">
                        <h3>${w.name}</h3>
                        <p>${w.kcal} KCAL • ${w.min} DAKİKA</p>
                    </div>
                </div>`;
        });
        document.getElementById('user-count').innerText = state.count;
        document.getElementById('user-kcal').innerText = state.kcal;
        document.getElementById('user-min').innerText = state.min;

        // Map
        document.querySelectorAll('rect, circle').forEach(el => el.classList.remove('active-part'));
        if(state.lastMus) {
            if(state.lastMus === 'arm') { document.getElementById('mus-arm-l').classList.add('active-part'); document.getElementById('mus-arm-r').classList.add('active-part'); }
            else { document.getElementById('mus-'+state.lastMus).classList.add('active-part'); }
        }
    }

    let activeW = null;
    let stepIdx = 0;
    let restTimer;

    function start(id) {
        activeW = workouts.find(x => x.id === id);
        stepIdx = 0;
        document.getElementById('supreme-modal').style.display = 'flex';
        updateStep();
        tts(activeW.name + " başlıyor. Bol şans.");
    }

    function updateStep() {
        const s = activeW.steps[stepIdx];
        document.getElementById('ex-name').innerText = s.n;
        document.getElementById('ex-val').innerText = s.v;
        document.getElementById('ex-icon').className = "fas " + s.icon;
        document.getElementById('step-info').innerText = `${stepIdx + 1} / ${activeW.steps.length}`;
        document.getElementById('p-bar').style.width = ((stepIdx) / activeW.steps.length) * 100 + "%";
    }

    function nextStep() {
        stepIdx++;
        if(stepIdx < activeW.steps.length) {
            openRest();
        } else {
            finish();
        }
    }

    function openRest() {
        document.getElementById('rest-overlay').style.display = 'flex';
        document.getElementById('next-label').innerText = "Sıradaki: " + activeW.steps[stepIdx].n;
        let c = 20;
        document.getElementById('rest-clock').innerText = c;
        tts("Dinlenme vakti.");

        restTimer = setInterval(() => {
            c--;
            document.getElementById('rest-clock').innerText = c;
            if(c <= 0) skipRest();
        }, 1000);
    }

    function skipRest() {
        clearInterval(restTimer);
        document.getElementById('rest-overlay').style.display = 'none';
        updateStep();
    }

    function finish() {
        state.count++;
        state.kcal += activeW.kcal;
        state.min += activeW.min;
        state.lastMus = activeW.m;
        save();
        closeEngine();
        tts("Harika iş çıkardın! Antrenman bitti.");
        alert("TEBRİKLER! ANTRENMAN TAMAMLANDI.");
    }

    function calcBMI() {
        const height = document.getElementById('h').value / 100;
        const weight = document.getElementById('w').value;
        const bmi = (weight / (height * height)).toFixed(1);
        document.getElementById('bmi-res').innerText = "VKE: " + bmi;
    }

    function nav(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
        document.getElementById('p-'+p).classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
    }

    function closeEngine() { document.getElementById('supreme-modal').style.display = 'none'; clearInterval(restTimer); }
    function save() { localStorage.setItem('ff_supreme', JSON.stringify(state)); init(); }
    function reset() { if(confirm("Sıfırlansın mı?")) { localStorage.clear(); location.reload(); } }

    init();
</script>
</body>
</html>
